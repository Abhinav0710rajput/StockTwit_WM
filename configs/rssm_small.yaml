# TwitWave RSSM – Small config  (~8M params, CPU / L4 debug)

model:
  embed_dim: 32
  d_enc: 128
  h_dim: 256
  s_dim: 128            # z_dim = 384
  n_heads: 4
  n_layers: 1
  window_k: 4
  mlp_hidden: 128
  feature_dim: 5
  top_k: 100
  dropout: 0.1

train:
  seq_len: 52
  batch_size: 16
  num_workers: 2
  lr: 3.0e-4
  weight_decay: 1.0e-5
  grad_clip: 10.0
  max_epochs: 100
  warmup_epochs: 5
  patience: 15
  beta_start: 0.1
  beta_end: 1.0
  beta_anneal_epochs: 30
  free_nats: 3.0
  lambda_mse: 1.0
  bce_pos_weight: 10.0

eval:
  horizons: [1, 4, 13]
  context_len: 52
  n_samples: 20
  use_prior_mean: true
  virality_top_n: 20
  virality_horizon: 4
  precision_at_k: 100
  kl_spike_z_threshold: 2.0
  attn_top_n: 50
  latent_n_clusters: 5
  latent_tsne_perp: 30
  latent_umap_neighbors: 15
  cf_delta: 3.0
